# Ablation A4: Frozen Backbone
# CLIP blocks 22-23 kept frozen — measures benefit of partial CLIP fine-tuning

model_name: rfmoe_ablation
ablation_mode: frozen_backbone

all_dataset: [FaceForensics++, Celeb-DF-v2, DF40]
dataset_type: no_pair
compression: c23

frame_num:
  train: 4
  test: 8
  val: 8

train_batchSize: 32
test_batchSize: 16

optimizer:
  type: adam
  adam:
    lr: 0.0003
    weight_decay: 0.0001
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    amsgrad: false

lr_scheduler: cosine
lr_T_max: 30
lr_eta_min: 0.00001

nEpochs: 20
start_epoch: 0
loss_func: cross_entropy
load_balance_weight: 0.1
backbone_lr: 0.00001   # unused for this ablation (backbone fully frozen)

log_dir: /home/ibubu/ketupati/outputs/rf_moe_abl_frozen_bb_fs

save_feat: true
verbose: false
metric_scoring: auc
pretrained: null
manualSeed: 42
save_ckpt: true
cuda: true
cudnn: true
workers: 2

use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: [-10, 10]
  blur_prob: 0.1
  blur_limit: [3, 7]
  brightness_prob: 0.2
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

resolution: 224
with_landmark: false
with_mask: false
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]
