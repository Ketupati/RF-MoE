# rfmoe.yaml  —  RF-MoE model configuration for DF40 benchmark  (Phase 3 / Model 4)
# Copy to:  {REPO}/training/config/detector/rfmoe.yaml
# (setup.py does this automatically)
#
# Phase 3 changes vs Model1:
#   1. Cosine LR scheduler (was null)
#   2. weight_decay: 0.0001 (was 0.00001)
#   3. entropy_reg_weight: 0.1 — per-sample gate entropy regularization (new)

model_name: rfmoe
all_dataset: [FaceForensics++, Celeb-DF-v2, DF40]
dataset_type: no_pair
compression: c23

frame_num:
  train: 4
  test: 8
  val: 8

train_batchSize: 32       # Phase 2 revised: reduced — unfrozen CLIP blocks need activation memory
test_batchSize: 16        # Phase 2 revised: reduced from 32

optimizer:
  type: adam
  adam:
    lr: 0.0003
    weight_decay: 0.0001
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    amsgrad: false
  sgd:
    lr: 0.01
    weight_decay: 0.0005
    momentum: 0.9

lr_scheduler: cosine
lr_T_max: 30
lr_eta_min: 0.00001

nEpochs: 30
start_epoch: 0
loss_func: cross_entropy
load_balance_weight: 0.1       # weight on MoE load-balancing auxiliary loss
entropy_reg_weight: 0.1        # Phase 3: per-sample gate entropy regularization

# Phase 1 additions
contrastive_loss_weight: 0.0   # weight on supervised contrastive loss (0.0 to disable)
contrastive_temperature: 0.1   # temperature for InfoNCE similarity scaling

# Phase 2 revised
backbone_lr: 0.00001           # LR for unfrozen CLIP blocks 22-23 (adapter LR is 0.0003)

# log_dir is set by setup.py to {OUTPUTS}/rf_moe — checkpoints save here
log_dir: /home/ibubu/ketupati/outputs/rf_moe

save_feat: true
verbose: false
metric_scoring: auc
pretrained: null
manualSeed: 42
save_ckpt: true
cuda: true
cudnn: true

# IMPORTANT: do NOT raise workers above 2 — causes OOM during evaluation
workers: 2

use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: [-10, 10]
  blur_prob: 0.1
  blur_limit: [3, 7]
  brightness_prob: 0.2
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

resolution: 224
with_landmark: false
with_mask: false
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]
